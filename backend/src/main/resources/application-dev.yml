spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgresql}:${DB_PORT:5432}/${DB_NAME:settleup}
    username: ${DB_USERNAME:settleup}
    password: ${DB_PASSWORD:settleup123}
